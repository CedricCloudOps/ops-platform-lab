name: CI

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build application image
        run: docker build -t vault-app ./app

      - name: Validate Docker Compose file
        run: docker compose config --quiet
