# Ingress = routing RULES only. It does nothing without an Ingress Controller
# running in the cluster (k3s ships Traefik by default; ingress-nginx is the other
# common choice). This replaces the Nginx reverse proxy of the Compose stack.
#
# TLS: the certificate lives in a Secret of type kubernetes.io/tls, and the Ingress
# Controller terminates TLS with it. Create it from the self-signed cert you already
# generated for Nginx:
#
#   sudo k3s kubectl create secret tls vault-tls \
#     --cert=nginx/certs/vault.crt --key=nginx/certs/vault.key
#
# Then add "vault.local" to your client's hosts file, pointing at the node IP.
# In production you would NOT do this by hand: install cert-manager and annotate
# this Ingress with `cert-manager.io/cluster-issuer: letsencrypt-prod` — it obtains
# and renews Let's Encrypt certificates automatically.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: vault-app
spec:
  tls:
    - hosts:
        - vault.local
      secretName: vault-tls
  rules:
    # HTTPS through the TLS secret above
    - host: vault.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: vault-app
                port:
                  number: 80
    # Catch-all so the app stays reachable by raw node IP (lab convenience)
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: vault-app
                port:
                  number: 80
