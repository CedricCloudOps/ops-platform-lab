global:
  scrape_interval: 15s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: node          # host metrics (CPU, RAM, disk, network)
    static_configs:
      - targets: ["node-exporter:9100"]

  - job_name: cadvisor      # per-container metrics
    static_configs:
      - targets: ["cadvisor:8080"]

  - job_name: postgres      # PostgreSQL internals
    static_configs:
      - targets: ["postgres-exporter:9187"]

  - job_name: redis         # Redis internals
    static_configs:
      - targets: ["redis-exporter:9121"]
