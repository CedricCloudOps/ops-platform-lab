# Nginx reverse proxy + TLS termination.
#
# The "app" backend is resolved DYNAMICALLY through Docker's embedded DNS
# (127.0.0.11), re-checked every few seconds, instead of being resolved once at
# startup. Two benefits:
#   1. Nginx starts even if "app" is not up yet (no "host not found in upstream" crash).
#   2. If the app container is recreated (new IP), Nginx picks up the new IP within
#      a few seconds (no more 502 with a stale upstream IP).
# The trick: put the target in a variable so Nginx resolves it per-request via the
# resolver, rather than caching it at boot.

# Redirect all plain HTTP traffic to HTTPS
server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
}

# HTTPS reverse proxy
server {
    listen 443 ssl;
    server_name _;

    ssl_certificate     /etc/nginx/certs/vault.crt;
    ssl_certificate_key /etc/nginx/certs/vault.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    location / {
        resolver 127.0.0.11 valid=5s;      # Docker embedded DNS, re-resolve every 5s
        set $backend "app:5000";           # target in a variable -> dynamic resolution
        proxy_pass http://$backend;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}
