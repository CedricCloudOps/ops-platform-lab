<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 410" width="680">
<style>
  text{font-family:'Segoe UI',Roboto,Helvetica,Arial,sans-serif}
  .th{fill:#141a29;font-size:14px;font-weight:600}
  .ts{fill:#5b6472;font-size:12px}
  .c-blue{fill:#E6F1FB;stroke:#185FA5}
  .c-gray{fill:#F1EFE8;stroke:#5F5E5A}
  .c-green{fill:#EAF3DE;stroke:#3B6D11}
</style>
<rect x="0" y="0" width="680" height="410" fill="#f6f8fc"/>
<defs><marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#475569" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>

<rect class="c-blue" x="270" y="28" width="140" height="38" rx="8" stroke-width="0.5"/>
<text class="th" x="340" y="52" text-anchor="middle">Utilisateurs</text>

<rect class="c-blue" x="245" y="90" width="190" height="40" rx="8" stroke-width="0.5"/>
<text class="th" x="340" y="115" text-anchor="middle">Load Balancer (cloud)</text>

<rect x="25" y="150" width="630" height="168" rx="12" fill="none" stroke="#475569" stroke-width="1" stroke-dasharray="5 4" opacity="0.55"/>
<text class="ts" x="38" y="167" text-anchor="start">Cluster Kubernetes - plusieurs noeuds</text>

<rect class="c-blue" x="250" y="178" width="180" height="34" rx="8" stroke-width="0.5"/>
<text class="th" x="340" y="200" text-anchor="middle">Ingress Controller</text>

<rect class="c-gray" x="45" y="250" width="180" height="50" rx="8" stroke-width="0.5"/>
<text class="th" x="135" y="271" text-anchor="middle">Worker node 1</text>
<text class="ts" x="135" y="288" text-anchor="middle">pods (app . worker)</text>
<rect class="c-gray" x="250" y="250" width="170" height="50" rx="8" stroke-width="0.5"/>
<text class="th" x="335" y="271" text-anchor="middle">Worker node 2</text>
<text class="ts" x="335" y="288" text-anchor="middle">pods (app . worker)</text>
<rect class="c-gray" x="445" y="250" width="180" height="50" rx="8" stroke-width="0.5"/>
<text class="th" x="535" y="271" text-anchor="middle">Worker node 3</text>
<text class="ts" x="535" y="288" text-anchor="middle">pods (app . worker)</text>

<rect class="c-green" x="150" y="348" width="380" height="46" rx="8" stroke-width="0.5"/>
<text class="th" x="340" y="368" text-anchor="middle">Services manages (hors cluster)</text>
<text class="ts" x="340" y="384" text-anchor="middle">PostgreSQL . Redis . Stockage objet (S3)</text>

<line x1="340" y1="66" x2="340" y2="88" stroke="#475569" stroke-width="1" marker-end="url(#arrow)"/>
<line x1="340" y1="130" x2="340" y2="176" stroke="#475569" stroke-width="1" marker-end="url(#arrow)"/>
<line x1="300" y1="212" x2="140" y2="248" stroke="#475569" stroke-width="1" marker-end="url(#arrow)"/>
<line x1="340" y1="212" x2="335" y2="248" stroke="#475569" stroke-width="1" marker-end="url(#arrow)"/>
<line x1="380" y1="212" x2="530" y2="248" stroke="#475569" stroke-width="1" marker-end="url(#arrow)"/>
<line x1="335" y1="300" x2="338" y2="346" stroke="#475569" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
<text class="ts" x="398" y="330" text-anchor="middle">les pods utilisent</text>
</svg>
