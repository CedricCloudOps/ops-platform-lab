services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: vault
      POSTGRES_USER: vault
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
    secrets:
      - postgres_password
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7
    restart: unless-stopped

  minio:
    image: quay.io/minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_USER:-admin}
      MINIO_ROOT_PASSWORD_FILE: /run/secrets/minio_password
    secrets:
      - minio_password
    volumes:
      - miniodata:/data
    ports:
      - "9001:9001"   # web console
    restart: unless-stopped

  kafka:
    image: apache/kafka:3.8.0
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    restart: unless-stopped

  app:
    build: ./app
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_USER: vault
      POSTGRES_DB: vault
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
      REDIS_HOST: redis
      MINIO_ENDPOINT: minio:9000
      MINIO_USER: ${MINIO_USER:-admin}
      MINIO_PASSWORD_FILE: /run/secrets/minio_password
      KAFKA_BROKER: kafka:9092
      ADMIN_USER: ${ADMIN_USER:-admin}
      ADMIN_PASSWORD_FILE: /run/secrets/admin_password
      SECRET_KEY_FILE: /run/secrets/secret_key
    secrets:
      - postgres_password
      - minio_password
      - admin_password
      - secret_key
    depends_on: [postgres, redis, minio, kafka]
    restart: unless-stopped

  worker:
    build: ./app
    command: python worker.py
    environment:
      KAFKA_BROKER: kafka:9092
      POSTGRES_HOST: postgres
      POSTGRES_USER: vault
      POSTGRES_DB: vault
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
      MINIO_ENDPOINT: minio:9000
      MINIO_USER: ${MINIO_USER:-admin}
      MINIO_PASSWORD_FILE: /run/secrets/minio_password
      CLAMAV_HOST: clamav
    secrets:
      - postgres_password
      - minio_password
    depends_on: [kafka, minio, postgres, clamav]
    restart: unless-stopped

  clamav:
    image: clamav/clamav:latest
    restart: unless-stopped

  nginx:
    image: nginx:1.27
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on: [app]
    restart: unless-stopped

  # --- Monitoring ---
  prometheus:
    image: prom/prometheus
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/alerts.yml:/etc/prometheus/alerts.yml:ro
      - promdata:/prometheus
    ports:
      - "9090:9090"
    restart: unless-stopped

  alertmanager:
    image: prom/alertmanager
    volumes:
      - ./monitoring/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    ports:
      - "9093:9093"
    restart: unless-stopped

  grafana:
    image: grafana/grafana
    ports:
      - "3000:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    restart: unless-stopped

  node-exporter:
    image: prom/node-exporter:latest
    command:
      - '--path.rootfs=/host'
    pid: host
    volumes:
      - '/:/host:ro,rslave'
    restart: unless-stopped

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    privileged: true
    devices:
      - /dev/kmsg
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    restart: unless-stopped

  postgres-exporter:
    image: quay.io/prometheuscommunity/postgres-exporter:latest
    environment:
      DATA_SOURCE_URI: "postgres:5432/vault?sslmode=disable"
      DATA_SOURCE_USER: vault
      DATA_SOURCE_PASS_FILE: /run/secrets/postgres_password
    secrets:
      - postgres_password
    depends_on: [postgres]
    restart: unless-stopped

  redis-exporter:
    image: oliver006/redis_exporter:latest
    environment:
      REDIS_ADDR: redis://redis:6379
    depends_on: [redis]
    restart: unless-stopped

volumes:
  pgdata:
  miniodata:
  grafana-data:
  promdata:

secrets:
  postgres_password:
    file: ./secrets/postgres_password.txt
  minio_password:
    file: ./secrets/minio_password.txt
  admin_password:
    file: ./secrets/admin_password.txt
  secret_key:
    file: ./secrets/secret_key.txt
